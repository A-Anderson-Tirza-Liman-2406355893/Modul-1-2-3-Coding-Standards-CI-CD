<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete Product</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-4">
    <h2>Delete Product</h2>

    <div class="alert alert-danger">
        Are you sure you want to delete this product?
    </div>

    <ul class="list-group mb-3">
        <li class="list-group-item">
            <strong>Name:</strong>
            <span th:text="${product.productName}"></span>
        </li>
        <li class="list-group-item">
            <strong>Quantity:</strong>
            <span th:text="${product.productQuantity}"></span>
        </li>
    </ul>

    <form th:action="@{/product/delete}" method="post" style="display:inline;">
        <input type="hidden" name="id" th:value="${product.productId}" />
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
    </form>

    <a th:href="@{/product/list}" class="btn btn-secondary">
        Cancel
    </a>
</div>

</body>
</html>
